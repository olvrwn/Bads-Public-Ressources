name: Weekly Guides Agent

on:
  schedule:
    # Every Friday at 09:00 UTC — adjust timezone offset if needed
    - cron: "0 9 * * 5"

  # Lets you trigger it manually from GitHub Actions tab (useful for testing)
  workflow_dispatch:

permissions:
  contents: write       # needed to push branches
  pull-requests: write  # needed to create PRs

jobs:
  update-guides:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # agent can be slow — give it time

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0  # full history so we can branch properly

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: pip install anthropic httpx

      # ── 4. Run the agent ──────────────────────────────────────────────────
      - name: Run guides agent
        id: agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/agent.py > agent_output.json
          echo "Agent finished."

      # ── 5. Read summary for PR body & notification ────────────────────────
      - name: Parse agent summary
        id: summary
        run: |
          python - << 'PYEOF'
          import json, sys, os

          with open("agent_output.json") as f:
              content = f.read()

          lines = content.strip().split("\n")
          json_start = None
          for i, line in enumerate(lines):
              if line.strip() == "{":
                  json_start = i
          if json_start is None:
              print("No summary JSON found")
              sys.exit(1)

          summary = json.loads("\n".join(lines[json_start:]))
          with open("summary.json", "w") as f:
              json.dump(summary, f)

          # ── Scalar outputs ──────────────────────────────────────────────
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"total={summary['total_guides']}\n")
              out.write(f"added={summary['new_added']}\n")
              out.write(f"removed={summary['removed']}\n")
              out.write(f"date={summary['date']}\n")

              # ── Multi-line: added articles ──────────────────────────────
              # GitHub Actions requires the heredoc syntax for multi-line values.
              added_lines = "\n".join(
                  "- [{title}]({url}) `{lang}` · {habits} · _{desc}_".format(
                      title=g.get("title", "(no title)"),
                      url=g["url"],
                      lang=g.get("language", ""),
                      habits=", ".join(g.get("habits") or []),
                      desc=(g.get("description") or "").replace("\n", " ").strip(),
                  )
                  for g in summary.get("new_details", [])
              ) or "_None this week_"

              # ── Multi-line: removed articles ────────────────────────────
              removed_lines = "\n".join(
                  "- [{title}]({url}) — {reason}".format(
                      title=g.get("title", "(no title)"),
                      url=g["url"],
                      reason=g.get("reason", "Unknown"),
                  )
                  for g in summary.get("removed_details", [])
              ) or "_None this week_"

              # ── Slack-friendly plain-text versions (no markdown links) ──
              # Slack uses mrkdwn, not GitHub markdown, so links need <url|text> format.
              slack_added = "\n".join(
                  "• <{url}|{title}> `{lang}` — {habits}".format(
                      url=g["url"],
                      title=g.get("title", "(no title)"),
                      lang=g.get("language", ""),
                      habits=", ".join(g.get("habits") or []),
                  )
                  for g in summary.get("new_details", [])
              ) or "_None this week_"

              slack_removed = "\n".join(
                  "• <{url}|{title}> — {reason}".format(
                      url=g["url"],
                      title=g.get("title", "(no title)"),
                      reason=g.get("reason", "Unknown"),
                  )
                  for g in summary.get("removed_details", [])
              ) or "_None this week_"

              out.write(f"added_lines<<EOF\n{added_lines}\nEOF\n")
              out.write(f"removed_lines<<EOF\n{removed_lines}\nEOF\n")
              out.write(f"slack_added<<EOF\n{slack_added}\nEOF\n")
              out.write(f"slack_removed<<EOF\n{slack_removed}\nEOF\n")
          PYEOF

      # ── 6. Commit changes to a new branch ────────────────────────────────
      - name: Commit updated guides JSON
        id: commit
        run: |
          BRANCH="guides-update-$(date +%Y-%m-%d)-${{ github.run_number }}"
          git config user.name  "guides-bot"
          git config user.email "guides-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add guides.json
          git reset HEAD .github/   # safeguard: never stage workflow files
          git diff --cached --quiet && echo "no_changes=true" >> $GITHUB_OUTPUT || true
          git commit -m "chore: weekly guides update $(date +%Y-%m-%d)" || true
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      # ── 7. Create Pull Request ────────────────────────────────────────────
      - name: Create Pull Request
        id: pr
        if: steps.commit.outputs.no_changes != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --title "📚 Weekly guides update – ${{ steps.summary.outputs.date }}" \
            --body "## Weekly Guides Agent Report

          | | Count |
          |---|---|
          | ✅ New articles added | ${{ steps.summary.outputs.added }} |
          | 🗑️ Articles removed | ${{ steps.summary.outputs.removed }} |
          | 📚 Total guides | ${{ steps.summary.outputs.total }} |

          ### ✅ Added articles
          ${{ steps.summary.outputs.added_lines }}

          ### 🗑️ Removed articles
          ${{ steps.summary.outputs.removed_lines }}

          > Auto-generated by the Guides Agent. Please review before merging." \
            --label "automated" \
            --base main \
            --head "${{ steps.commit.outputs.branch }}")
          echo "pull-request-url=$PR_URL" >> $GITHUB_OUTPUT

      # ── 8. Send Slack notification ────────────────────────────────────────
      - name: Notify via Slack
        if: steps.pr.outputs.pull-request-url != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Build the JSON payload in a file to avoid shell quoting issues
          # with multi-line strings from the summary outputs.
          python - << 'PYEOF'
          import json, os

          pr_url    = "${{ steps.pr.outputs.pull-request-url }}"
          date      = "${{ steps.summary.outputs.date }}"
          added_n   = "${{ steps.summary.outputs.added }}"
          removed_n = "${{ steps.summary.outputs.removed }}"
          total_n   = "${{ steps.summary.outputs.total }}"

          # Read multi-line values from the summary file to avoid YAML quoting issues
          with open("summary.json") as f:
              summary = json.load(f)

          slack_added = "\n".join(
              "• <{url}|{title}> `{lang}` — {habits}".format(
                  url=g["url"],
                  title=g.get("title", "(no title)"),
                  lang=g.get("language", ""),
                  habits=", ".join(g.get("habits") or []),
              )
              for g in summary.get("new_details", [])
          ) or "_None this week_"

          slack_removed = "\n".join(
              "• <{url}|{title}> — {reason}".format(
                  url=g["url"],
                  title=g.get("title", "(no title)"),
                  reason=g.get("reason", "Unknown"),
              )
              for g in summary.get("removed_details", [])
          ) or "_None this week_"

          payload = {
              "blocks": [
                  {
                      "type": "header",
                      "text": {
                          "type": "plain_text",
                          "text": f"📚 Weekly Guides Update — {date}",
                          "emoji": True,
                      },
                  },
                  {
                      "type": "section",
                      "fields": [
                          {"type": "mrkdwn", "text": f"*✅ Added*\n{added_n}"},
                          {"type": "mrkdwn", "text": f"*🗑️ Removed*\n{removed_n}"},
                          {"type": "mrkdwn", "text": f"*📚 Total*\n{total_n}"},
                      ],
                  },
                  {"type": "divider"},
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": f"*✅ Added articles*\n{slack_added}",
                      },
                  },
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": f"*🗑️ Removed articles*\n{slack_removed}",
                      },
                  },
                  {"type": "divider"},
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": f"🔗 <{pr_url}|View full PR>",
                      },
                  },
              ]
          }

          with open("slack_payload.json", "w") as f:
              json.dump(payload, f)
          PYEOF

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d @slack_payload.json

      # ── 9. No-changes notification ────────────────────────────────────────
      - name: Notify — no changes
        if: steps.commit.outputs.no_changes == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"text": "📚 Weekly Guides Agent ran — no changes needed this week."}'
