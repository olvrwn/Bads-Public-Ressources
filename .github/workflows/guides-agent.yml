name: Weekly Guides Agent

on:
  schedule:
    # Every Friday at 09:00 UTC
    - cron: "0 9 * * 5"

  # Lets you trigger it manually from GitHub Actions tab (useful for testing)
  workflow_dispatch:

permissions:
  contents: write       # needed to push branches
  pull-requests: write  # needed to create PRs

jobs:
  update-guides:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # -- 1. Checkout repo ----------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      # -- 2. Set up Python ----------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"

      # -- 3. Install dependencies ---------------------------------------------
      - name: Install dependencies
        run: pip install anthropic httpx

      # -- 4. Run agent --------------------------------------------------------
      - name: Run Guides Agent
        id: agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/agent.py > agent_output.json
          echo "Agent finished."

      # -- 5. Parse summary & prepare output vars ------------------------------
      - name: Parse agent summary
        id: summary
        run: |
          python - << 'PYEOF'
          import json, os

          with open("summary.json") as f:
              summary = json.load(f)

          # Markdown lines for PR body (GitHub markdown links)
          added_lines = "\n".join(
              "- [{url}]({url}) — {description}".format(
                  url=g["url"],
                  description=(g.get("description") or g.get("title", "(no title)")),
              )
              for g in summary.get("new_details", [])
          ) or "_None this week_"

          removed_lines = "\n".join(
              "- [{url}]({url}) — {reason}".format(
                  url=g["url"],
                  reason=g.get("reason", "Unknown"),
              )
              for g in summary.get("removed_details", [])
          ) or "_None this week_"

          out_path = os.environ["GITHUB_OUTPUT"]
          with open(out_path, "a") as out:
              out.write(f"date={summary['date']}\n")
              out.write(f"total={summary['total_guides']}\n")
              out.write(f"added={summary['new_added']}\n")
              out.write(f"removed={summary['removed']}\n")
              out.write(f"added_lines<<EOF\n{added_lines}\nEOF\n")
              out.write(f"removed_lines<<EOF\n{removed_lines}\nEOF\n")
          PYEOF

      # -- 6. Commit changes to a new branch -----------------------------------
      - name: Commit updated guides JSON
        id: commit
        run: |
          BRANCH="guides-update-$(date +%Y-%m-%d)-${{ github.run_number }}"
          git config user.name  "guides-bot"
          git config user.email "guides-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add guides.json
          git reset HEAD .github/   # safeguard: never stage workflow files
          git diff --cached --quiet && echo "no_changes=true" >> $GITHUB_OUTPUT || true
          git commit -m "chore: weekly guides update $(date +%Y-%m-%d)" || true
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      # -- 7. Create Pull Request ----------------------------------------------
      - name: Create Pull Request
        id: pr
        if: steps.commit.outputs.no_changes != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --title "📚 Weekly guides update — ${{ steps.summary.outputs.date }}" \
            --body "## 📚 Weekly Guides Update — ${{ steps.summary.outputs.date }}

          ---

          ### ✅ Added Guides | Total: ${{ steps.summary.outputs.added }}

          ${{ steps.summary.outputs.added_lines }}

          ---

          ### 🗑️ Removed Guides | Total: ${{ steps.summary.outputs.removed }}

          ${{ steps.summary.outputs.removed_lines }}

          ---

          ### 📚 Current Total Guides: ${{ steps.summary.outputs.total }}

          > Auto-generated by the Guides Agent. Please review before merging." \
            --label "automated" \
            --base main \
            --head "${{ steps.commit.outputs.branch }}")
          echo "pull-request-url=$PR_URL" >> $GITHUB_OUTPUT

      # -- 8. Send Slack notification ------------------------------------------
      - name: Notify via Slack
        if: steps.pr.outputs.pull-request-url != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python - << 'PYEOF'
          import json, os

          pr_url  = "${{ steps.pr.outputs.pull-request-url }}"
          date    = "${{ steps.summary.outputs.date }}"
          total_n = "${{ steps.summary.outputs.total }}"

          with open("summary.json") as f:
              summary = json.load(f)

          # ✅ Added Guides section
          new_details = summary.get("new_details", [])
          if new_details:
              added_lines = "\n".join(
                  "• <{url}|{url}> — {description}".format(
                      url=g["url"],
                      description=(g.get("description") or g.get("title", "(no title)")),
                  )
                  for g in new_details
              )
              added_block = f"✅ *Added Guides* | Total: {len(new_details)}\n{added_lines}"
          else:
              added_block = "✅ *Added Guides* | Total: 0\n_None this week_"

          # 🗑️ Removed Guides section
          removed_details = summary.get("removed_details", [])
          if removed_details:
              removed_lines = "\n".join(
                  "• <{url}|{url}> — {reason}".format(
                      url=g["url"],
                      reason=g.get("reason", "Unknown"),
                  )
                  for g in removed_details
              )
              removed_block = f"🗑️ *Removed Guides* | Total: {len(removed_details)}\n{removed_lines}"
          else:
              removed_block = "🗑️ *Removed Guides* | Total: 0\n_None this week_"

          payload = {
              "blocks": [
                  {
                      "type": "header",
                      "text": {
                          "type": "plain_text",
                          "text": f"📚 Weekly Guides Update — {date}",
                          "emoji": True,
                      },
                  },
                  {"type": "divider"},
                  {
                      "type": "section",
                      "text": {"type": "mrkdwn", "text": added_block},
                  },
                  {
                      "type": "section",
                      "text": {"type": "mrkdwn", "text": removed_block},
                  },
                  {"type": "divider"},
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": f"📚 *Current Total Guides:* {total_n}\n🔗 <{pr_url}|View Pull Request>",
                      },
                  },
              ]
          }

          with open("slack_payload.json", "w") as f:
              json.dump(payload, f)
          PYEOF

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d @slack_payload.json

      # -- 9. No-changes notification ------------------------------------------
      - name: Notify — no changes
        if: steps.commit.outputs.no_changes == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"text": "📚 Weekly Guides Agent ran — no changes needed this week."}'